<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change password — VYAYAM</title>
  <style>
    body { font-family:-apple-system,system-ui,sans-serif; background:#f6f8f7; margin:0; color:#1a1c1c; }
    .wrap { max-width:460px; margin:0 auto; padding:20px 16px; }
    label { display:block; font-size:.8rem; font-weight:700; color:#444; margin-bottom:5px; }
    input { width:100%; box-sizing:border-box; padding:12px; border:1px solid #d8dcda; border-radius:10px; margin-bottom:14px; font-size:.95rem; }
    button { width:100%; padding:14px; border:none; border-radius:999px; background:#0c6c3f; color:#fff; font-weight:700; font-size:.95rem; }
    .msg-ok { background:#e8f5ee; color:#0c6c3f; border-radius:10px; padding:12px; font-weight:600; font-size:.9rem; margin-bottom:14px; }
    .msg-err { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; border-radius:10px; padding:12px; font-weight:600; font-size:.9rem; margin-bottom:14px; }
    a.back { text-decoration:none; color:#0c6c3f; font-weight:700; font-size:.85rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="javascript:history.back()">&larr; Back</a>
    <h2 style="font-size:1.25rem; font-weight:800; margin:12px 0 4px;">Change password</h2>
    <p style="font-size:.85rem; color:#666; margin-bottom:18px;">Update your own password — no need to ask anyone.</p>
    {% if success %}<div class="msg-ok">Password changed. Use the new one next time you log in.</div>{% endif %}
    {% if error %}<div class="msg-err">{{ error }}</div>{% endif %}
    <form method="post" autocomplete="off">
      {% csrf_token %}
      <label>Current password</label>
      <input type="password" name="old_password" required>
      <label>New password</label>
      <input type="password" name="new_password" required minlength="6">
      <label>Confirm new password</label>
      <input type="password" name="confirm_password" required minlength="6">
      <button type="submit">Update password</button>
    </form>
  </div>
</body>
</html>
